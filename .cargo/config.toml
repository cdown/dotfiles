[target.'cfg(target_os = "linux")']
rustflags = ["-C", "target-cpu=native", "-C", "link-arg=-fuse-ld=mold"]

[target.'cfg(not(target_os = "linux"))']
rustflags = ["-C", "target-cpu=native"]

[profile.release]
codegen-units = 1
lto = "fat"

[profile.profiling]
inherits = "release"
debug = true
codegen-units = 64
lto = "off"
incremental = true
